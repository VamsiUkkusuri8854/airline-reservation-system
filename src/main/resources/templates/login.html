<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FlyHigh Airlines - Secure Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(10, 37, 64, 0.65), rgba(0, 72, 140, 0.65)), url('/images/airport_bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(20, 30, 48, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: white;
            width: 100%;
            max-width: 420px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #00a8cc;
            color: white;
            box-shadow: none;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
            opacity: 1;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00a8cc, #0072ac);
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0072ac, #004c7a);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="login-card text-center">
        <img src="/images/airline_logo.png" alt="Logo" width="70" height="70" class="mb-3">
        <h2 class="fw-bold text-white mb-1">✈  FlyHigh Portal</h2>
        <p class="small text-muted mb-4">Your Gateway to the World</p>

        <!-- Error Notification -->
        <div th:if="${error != null}" class="alert alert-danger py-2 small text-start" th:text="${error}">
            Invalid credentials alert.
        </div>
        <div th:if="${success != null}" class="alert alert-success py-2 small text-start" th:text="${success}">
            Registration success alert.
        </div>

        <form action="/login" method="post" class="text-start">
            <div class="mb-3">
                <label class="form-label small fw-bold text-light">Passenger Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username..." required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-light">Secure Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password..." required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 py-2 mb-3">🔑  Secure Login</button>
        </form>

        <a href="/register" class="text-info small text-decoration-none d-block">👤  Create Passenger Profile</a>
        </div>
    </div>

<!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-auto w-100">
        <p class="m-0 small">&copy; 2026 Vamsi Ukkusuri. All Rights Reserved. | FlyHigh Airlines</p>
    </footer>
</body>
</html>
