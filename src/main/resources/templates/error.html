<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FlyHigh Airlines - Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body {
            background: linear-gradient(rgba(10, 37, 64, 0.7), rgba(0, 72, 140, 0.7)), url('/images/airport_bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="error-card">
        <h1 class="display-1 text-danger fw-bold mb-3">⚠️</h1>
        <h2 class="fw-bold text-dark mb-3" th:text="${errorTitle != null ? errorTitle : 'Oops! Flight Delayed'}">Error</h2>
        <p class="text-muted mb-4" th:text="${errorMessage != null ? errorMessage : 'Something went wrong. Please try again or return to the terminal.'}"></p>
        
        <a href="/" class="btn btn-primary btn-lg px-5">Return to Homepage</a>
    </div>

</body>
</html>
