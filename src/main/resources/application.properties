# Spring Datasource MySQL properties matching active credentials
spring.datasource.url=jdbc:mysql://localhost:3306/airline_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Thymeleaf caching settings (False for dev live templates reload)
spring.thymeleaf.cache=false

# Session configs
server.servlet.session.timeout=30m

# Server Port
server.port=9090
