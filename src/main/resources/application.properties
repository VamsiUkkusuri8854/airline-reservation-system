# Spring Datasource MySQL properties matching active credentials
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/airline_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate configs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# Thymeleaf caching settings (False for dev live templates reload)
spring.thymeleaf.cache=false

# Session configs
server.servlet.session.timeout=30m

# Server Port
server.port=${PORT:9090}
aviationstack.api.key=${AVIATION_API_KEY:a79890856020707c77decaf08836942b}